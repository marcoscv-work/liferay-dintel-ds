<div class="dintel-accordion" data-exclusive="${configuration.exclusive?c}">
  <div class="dintel-accordion__item dintel-accordion__item--open">
    <button
      class="dintel-accordion__trigger"
      type="button"
      aria-expanded="true"
      aria-controls="acc-panel-1"
      id="acc-header-1"
    >
      <span class="dintel-accordion__title" data-lfr-editable-id="acc-title-1" data-lfr-editable-type="text">
        Pregunta o sección número uno
      </span>
      <svg class="dintel-accordion__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
    </button>
    <div class="dintel-accordion__panel" id="acc-panel-1" role="region" aria-labelledby="acc-header-1">
      <div class="dintel-accordion__body" data-lfr-editable-id="acc-body-1" data-lfr-editable-type="rich-text">
        Contenido de la primera sección del acordeón. Puede incluir texto, listas y otros elementos.
      </div>
    </div>
  </div>
  <div class="dintel-accordion__item">
    <button
      class="dintel-accordion__trigger"
      type="button"
      aria-expanded="false"
      aria-controls="acc-panel-2"
      id="acc-header-2"
    >
      <span class="dintel-accordion__title" data-lfr-editable-id="acc-title-2" data-lfr-editable-type="text">
        Pregunta o sección número dos
      </span>
      <svg class="dintel-accordion__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
    </button>
    <div class="dintel-accordion__panel" id="acc-panel-2" role="region" aria-labelledby="acc-header-2" hidden>
      <div class="dintel-accordion__body" data-lfr-editable-id="acc-body-2" data-lfr-editable-type="rich-text">
        Contenido de la segunda sección del acordeón con información adicional.
      </div>
    </div>
  </div>
  <div class="dintel-accordion__item">
    <button
      class="dintel-accordion__trigger"
      type="button"
      aria-expanded="false"
      aria-controls="acc-panel-3"
      id="acc-header-3"
    >
      <span class="dintel-accordion__title" data-lfr-editable-id="acc-title-3" data-lfr-editable-type="text">
        Pregunta o sección número tres
      </span>
      <svg class="dintel-accordion__icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 10l5 5 5-5z"/></svg>
    </button>
    <div class="dintel-accordion__panel" id="acc-panel-3" role="region" aria-labelledby="acc-header-3" hidden>
      <div class="dintel-accordion__body" data-lfr-editable-id="acc-body-3" data-lfr-editable-type="rich-text">
        Contenido de la tercera sección del acordeón.
      </div>
    </div>
  </div>
</div>
