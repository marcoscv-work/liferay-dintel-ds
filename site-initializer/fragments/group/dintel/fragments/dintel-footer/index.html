<footer class="dintel-footer" role="contentinfo">
  [#if configuration.showPrimaryLogos]
    <div class="dintel-footer__primary">
      <div class="container dintel-footer__primary-inner">
        <ul class="dintel-footer__logos" role="list">
          <li class="dintel-footer__logo-item">
            <a class="dintel-footer__logo-link" data-lfr-editable-id="footer-logo-1-link" data-lfr-editable-type="link" href="https://next-generation-eu.europa.eu/index_es" target="_blank" rel="noopener">
              <img class="dintel-footer__logo-img" src="[resources:europa.svg]" alt="Financiado por la Unión Europea NextGenerationEU, se abre en pestaña nueva" loading="lazy"/>
            </a>
          </li>
          <li class="dintel-footer__logo-item">
            <a class="dintel-footer__logo-link" data-lfr-editable-id="footer-logo-2-link" data-lfr-editable-type="link" href="https://planderecuperacion.gob.es/" target="_blank" rel="noopener">
              <img class="dintel-footer__logo-img" src="[resources:plan_recuperacion.svg]" alt="Plan de Recuperación Transformación y Resiliencia, se abre en pestaña nueva" loading="lazy"/>
            </a>
          </li>
          <li class="dintel-footer__logo-item">
            <a class="dintel-footer__logo-link" data-lfr-editable-id="footer-logo-3-link" data-lfr-editable-type="link" href="https://espanadigital.gob.es/" target="_blank" rel="noopener">
              <img class="dintel-footer__logo-img" src="[resources:espana_digital.svg]" alt="España digital, se abre en pestaña nueva" loading="lazy"/>
            </a>
          </li>
        </ul>
      </div>
    </div>
  [/#if]

  <div class="dintel-footer__main">
    <div class="container dintel-footer__main-inner">
      [#if configuration.showDescription]
        <p class="dintel-footer__description" data-lfr-editable-id="footer-description" data-lfr-editable-type="text">
          Plan de Recuperación, Transformación y Resiliencia - Financiado por la Unión Europea - NextGenerationEU
        </p>
      [/#if]

      <nav class="dintel-footer__nav" aria-label="Enlaces del pie de página">
        <ul class="dintel-footer__nav-list" role="list">
          <li><a class="dintel-footer__nav-link" data-lfr-editable-id="footer-link-1" data-lfr-editable-type="link" href="/ayuda"><span data-lfr-editable-id="footer-link-text-1" data-lfr-editable-type="text">Soporte</span></a></li>
          <li><a class="dintel-footer__nav-link" data-lfr-editable-id="footer-link-2" data-lfr-editable-type="link" href="/accesibilidad"><span data-lfr-editable-id="footer-link-text-2" data-lfr-editable-type="text">Accesibilidad</span></a></li>
          <li><a class="dintel-footer__nav-link" data-lfr-editable-id="footer-link-3" data-lfr-editable-type="link" href="/mapa-web"><span data-lfr-editable-id="footer-link-text-3" data-lfr-editable-type="text">Mapa Web</span></a></li>
          <li><a class="dintel-footer__nav-link" data-lfr-editable-id="footer-link-4" data-lfr-editable-type="link" href="/politica-cookies"><span data-lfr-editable-id="footer-link-text-4" data-lfr-editable-type="text">Política de Cookies</span></a></li>
        </ul>
      </nav>
    </div>
  </div>

  <div class="dintel-footer__bottom">
    <div class="container dintel-footer__bottom-inner">
      <p class="dintel-footer__copy" data-lfr-editable-id="footer-copy" data-lfr-editable-type="text">
        2025 © DINTEL · Sistema de Diseño
      </p>
    </div>
  </div>
</footer>
