<div class="dintel-search dintel-search--${configuration.mode!'inline'} dintel-search--${configuration.size!'md'} ${configuration.fullWidth?then('dintel-search--full', '')}">

  [#if configuration.mode == 'modal']
    <button class="dintel-search__trigger" type="button" aria-haspopup="dialog" aria-expanded="false" aria-controls="dintel-search-dialog">
      <svg class="dintel-search__icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span data-lfr-editable-id="search-trigger-text" data-lfr-editable-type="text">Buscar</span>
    </button>

    <div class="dintel-search__dialog" id="dintel-search-dialog" role="dialog" aria-modal="true" aria-labelledby="dintel-search-dialog-title" hidden>
      <div class="dintel-search__backdrop" data-search-close></div>
      <div class="dintel-search__dialog-panel">
        <div class="dintel-search__dialog-header">
          <h2 class="dintel-search__dialog-title" id="dintel-search-dialog-title" data-lfr-editable-id="search-dialog-title" data-lfr-editable-type="text">Buscar en el sitio</h2>
          <button class="dintel-search__dialog-close" type="button" aria-label="Cerrar buscador" data-search-close>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <form class="dintel-search__wrapper" role="search" action="/buscar" method="get">
          <svg class="dintel-search__icon dintel-search__icon--inline" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input class="dintel-search__input" id="dintel-search-modal-input" name="query" type="search" placeholder="Introduce tu búsqueda…" aria-label="Campo de búsqueda" autocomplete="off" autofocus/>
          <button class="dintel-search__submit" type="submit">
            <span data-lfr-editable-id="search-btn-text" data-lfr-editable-type="text">Buscar</span>
          </button>
        </form>
      </div>
    </div>
  [#else]
    [#if configuration.showLabel]
      <label class="dintel-search__label" for="dintel-search-input">
        <span data-lfr-editable-id="search-label" data-lfr-editable-type="text">Buscar</span>
      </label>
    [/#if]
    <form class="dintel-search__wrapper" role="search" action="/buscar" method="get">
      <svg class="dintel-search__icon dintel-search__icon--inline" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input
        class="dintel-search__input"
        id="dintel-search-input"
        name="query"
        type="search"
        placeholder="Introduce tu búsqueda…"
        aria-label="Campo de búsqueda"
        autocomplete="off"
      />
      <button class="dintel-search__submit" type="submit">
        <span data-lfr-editable-id="search-btn-text" data-lfr-editable-type="text">Buscar</span>
      </button>
    </form>
  [/#if]
</div>
